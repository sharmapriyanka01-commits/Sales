<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Partner App Renewal Alerts</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Partner App: Renewal Alerts</h1>
    <p class="subtitle">Alerts trigger when renewals are exactly 30, 60, or 90 days away.</p>

    <section class="panel controls">
      <h2>Test Controls</h2>
      <label for="as-of-date">As-of date:</label>
      <input id="as-of-date" type="date" />
      <button id="run-check" type="button">Run Alert Check</button>
      <button id="reset-date" type="button">Today</button>
      <p class="hint">Tip: change the as-of date to test when alerts appear.</p>
    </section>

    <section class="panel">
      <h2>Alert Popups</h2>
      <div id="popup-container" class="popup-container"></div>
      <ul id="alert-list" class="alert-list"></ul>
    </section>

    <section class="panel">
      <h2>Customer Renewals</h2>
      <table>
        <thead>
          <tr>
            <th>Customer</th>
            <th>SKU</th>
            <th>Renewal Date</th>
            <th>Days Remaining</th>
          </tr>
        </thead>
        <tbody id="customer-table-body"></tbody>
      </table>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
